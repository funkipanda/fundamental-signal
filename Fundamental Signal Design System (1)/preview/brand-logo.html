<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Brand — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--fs-bg);color:var(--fs-fg);font-family:var(--fs-font-sans);}
  .card{padding:24px;display:flex;align-items:center;gap:32px;min-height:150px;}
  .mark{display:flex;align-items:center;justify-content:center;width:96px;height:96px;}
  .mark img{width:100%;height:100%;}
  .wm{flex:1;display:flex;align-items:center;}
  .wm img{height:48px;}
  .meta{margin-left:auto;font-family:var(--fs-font-mono);font-size:11px;color:var(--fs-fg-dim);line-height:1.6;}
</style></head>
<body><div class="card">
  <div class="mark"><img src="../assets/monogram.svg" alt="Monogram"/></div>
  <div class="wm"><img src="../assets/wordmark.svg" alt="Fundamental Signal"/></div>
  <div class="meta">monogram.svg<br/>wordmark.svg<br/>placeholder — flag</div>
</div></body></html>
