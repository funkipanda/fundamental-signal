<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Neutral Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--fs-bg);color:var(--fs-fg);font-family:var(--fs-font-sans);}
  .card{padding:20px;}
  .row{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
  .sw{aspect-ratio:1/1.2;border:1px solid var(--fs-border-soft);border-radius:2px;padding:8px;display:flex;flex-direction:column;justify-content:space-between;}
  .nm{font-family:var(--fs-font-mono);font-size:9px;color:var(--fs-fg-strong);font-weight:500;}
  .hex{font-family:var(--fs-font-mono);font-size:9px;color:var(--fs-fg-muted);}
</style></head>
<body><div class="card"><div class="row">
  <div class="sw" style="background:var(--fs-black);color:var(--fs-fg)"><div class="nm">black</div><div class="hex">07090D</div></div>
  <div class="sw" style="background:var(--fs-ink-900);color:var(--fs-fg)"><div class="nm">ink-900</div><div class="hex">0B0E14</div></div>
  <div class="sw" style="background:var(--fs-ink-800);color:var(--fs-fg)"><div class="nm">ink-800</div><div class="hex">111520</div></div>
  <div class="sw" style="background:var(--fs-ink-700);color:var(--fs-fg)"><div class="nm">ink-700</div><div class="hex">161B29</div></div>
  <div class="sw" style="background:var(--fs-ink-600);color:var(--fs-fg)"><div class="nm">ink-600</div><div class="hex">1D2333</div></div>
  <div class="sw" style="background:var(--fs-ink-500);color:var(--fs-fg)"><div class="nm">ink-500</div><div class="hex">252C40</div></div>
  <div class="sw" style="background:var(--fs-ink-400);color:var(--fs-fg)"><div class="nm">ink-400</div><div class="hex">323A52</div></div>
  <div class="sw" style="background:var(--fs-ink-300);color:var(--fs-black)"><div class="nm">ink-300</div><div class="hex">4A5373</div></div>
  <div class="sw" style="background:var(--fs-ink-200);color:var(--fs-black)"><div class="nm">ink-200</div><div class="hex">7C86A3</div></div>
  <div class="sw" style="background:var(--fs-ink-100);color:var(--fs-black)"><div class="nm">ink-100</div><div class="hex">B8C0D6</div></div>
</div></div></body></html>
