<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--fs-bg);color:var(--fs-fg);font-family:var(--fs-font-sans);}
  .card{padding:20px;display:flex;align-items:flex-end;gap:14px;height:150px;}
  .tick{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--fs-signal-premium);border-radius:1px;width:28px;}
  .v{font-family:var(--fs-font-mono);font-size:10px;color:var(--fs-fg-strong);}
  .l{font-family:var(--fs-font-mono);font-size:9px;color:var(--fs-fg-dim);letter-spacing:0.08em;text-transform:uppercase;}
</style></head>
<body><div class="card">
  <div class="tick"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="l">space-1</div></div>
  <div class="tick"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="l">space-2</div></div>
  <div class="tick"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="l">space-3</div></div>
  <div class="tick"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="l">space-4</div></div>
  <div class="tick"><div class="bar" style="height:20px"></div><div class="v">20</div><div class="l">space-5</div></div>
  <div class="tick"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="l">space-6</div></div>
  <div class="tick"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="l">space-8</div></div>
  <div class="tick"><div class="bar" style="height:40px"></div><div class="v">40</div><div class="l">space-10</div></div>
  <div class="tick"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="l">space-12</div></div>
</div></body></html>
