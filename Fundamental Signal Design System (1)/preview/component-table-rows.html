<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Table Row States</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--fs-bg);color:var(--fs-fg);font-family:var(--fs-font-sans);}
  .card{padding:16px;}
  table{width:100%;border-collapse:collapse;font-family:var(--fs-font-mono);font-variant-numeric:tabular-nums;font-size:12px;}
  th{text-align:left;font-family:var(--fs-font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fs-fg-muted);font-weight:500;padding:6px 10px;border-bottom:1px solid var(--fs-border);}
  th.num{text-align:right;}
  td{padding:6px 10px;border-bottom:1px solid var(--fs-border-soft);height:28px;vertical-align:middle;}
  td.num{text-align:right;}
  tr.u{background:var(--fs-signal-undervalued-bg);}
  tr.o{background:var(--fs-signal-overvalued-bg);}
  tr.t{background:var(--fs-signal-trap-bg);}
  tr.p{background:var(--fs-signal-premium-bg);}
  tr.hover{background:var(--fs-bg-hover);}
  tr.sel{background:var(--fs-accent-bg);box-shadow:inset 2px 0 0 var(--fs-accent);}
  .tk{font-weight:700;color:var(--fs-fg-strong);}
  .sig{font-weight:700;}
  .sig.u{color:var(--fs-signal-undervalued);}
  .sig.o{color:var(--fs-signal-overvalued);}
  .sig.t{color:var(--fs-signal-trap);}
  .sig.p{color:var(--fs-signal-premium);}
  .sig.f{color:var(--fs-signal-fair);}
</style></head>
<body><div class="card">
  <table><thead><tr><th>Ticker</th><th>Signal</th><th class="num">Fwd P/E</th><th class="num">FCF Yld</th><th class="num">ROE</th></tr></thead><tbody>
    <tr class="u"><td class="tk">JPM</td><td class="sig u">▼ UNDERVALUED</td><td class="num">10.2x</td><td class="num">8.1%</td><td class="num">15.2%</td></tr>
    <tr class="t"><td class="tk">INTC</td><td class="sig t">⚠ VALUE_TRAP</td><td class="num">60.2x</td><td class="num">-1.3%</td><td class="num">0.0%</td></tr>
    <tr class="o"><td class="tk">TSLA</td><td class="sig o">▲ OVERVALUED</td><td class="num">82.4x</td><td class="num">1.8%</td><td class="num">21.9%</td></tr>
    <tr class="p"><td class="tk">AAPL</td><td class="sig p">★ QUALITY_PREMIUM</td><td class="num">29.0x</td><td class="num">2.7%</td><td class="num">152%</td></tr>
    <tr class="hover"><td class="tk">MSFT</td><td class="sig f">― FAIR_VALUE</td><td class="num">22.0x</td><td class="num">1.7%</td><td class="num">34.4%</td></tr>
    <tr class="sel"><td class="tk">XOM</td><td class="sig p">★ QUALITY_PREMIUM</td><td class="num">14.9x</td><td class="num">2.0%</td><td class="num">11.1%</td></tr>
  </tbody></table>
</div></body></html>
