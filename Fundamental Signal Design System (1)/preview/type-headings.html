<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--fs-bg);color:var(--fs-fg);font-family:var(--fs-font-sans);}
  .card{padding:20px;}
  .row{display:flex;align-items:baseline;gap:20px;border-bottom:1px dashed var(--fs-border-soft);padding:8px 0;}
  .row:last-child{border-bottom:0;}
  .spec{font-family:var(--fs-font-mono);font-size:10px;color:var(--fs-fg-dim);min-width:120px;}
</style></head>
<body><div class="card">
  <div class="row"><div class="spec">h1 · 28/600</div><div class="fs-h1">Discrepancy screen</div></div>
  <div class="row"><div class="spec">h2 · 20/600</div><div class="fs-h2">Valuation vs. sector</div></div>
  <div class="row"><div class="spec">h3 · 16/600</div><div class="fs-h3">Quality filters</div></div>
  <div class="row"><div class="spec">h4 · 14/600</div><div class="fs-h4">Price context</div></div>
</div></body></html>
