<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Accent & Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--fs-bg);color:var(--fs-fg);font-family:var(--fs-font-sans);}
  .card{padding:20px;display:flex;gap:20px;}
  .col{flex:1;}
  .lbl{font-family:var(--fs-font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fs-fg-muted);margin-bottom:8px;}
  .row{display:flex;gap:8px;}
  .sw{flex:1;padding:10px;border-radius:2px;font-family:var(--fs-font-mono);font-size:10px;}
  .t{font-weight:600;color:#07090d;margin-bottom:6px;}
  .h{color:rgba(7,9,13,0.7);}
</style></head>
<body><div class="card">
  <div class="col">
    <div class="lbl">Accent (interaction)</div>
    <div class="row">
      <div class="sw" style="background:#88a8ff"><div class="t">accent</div><div class="h">#88A8FF</div></div>
      <div class="sw" style="background:var(--fs-accent-bg);color:var(--fs-fg)"><div class="t" style="color:var(--fs-fg-strong)">accent-bg</div><div class="h" style="color:var(--fs-fg-dim)">rgba 12%</div></div>
    </div>
    <div style="margin-top:12px;padding:8px 12px;border:1px solid var(--fs-accent);border-radius:2px;box-shadow:var(--fs-shadow-focus);font-family:var(--fs-font-mono);font-size:11px;color:var(--fs-fg-strong);">Focus ring example</div>
  </div>
  <div class="col">
    <div class="lbl">Status (system messages)</div>
    <div class="row" style="flex-direction:column;gap:6px">
      <div style="padding:6px 10px;background:var(--fs-signal-undervalued-bg);border-left:2px solid var(--fs-status-ok);font-family:var(--fs-font-mono);font-size:11px;color:var(--fs-signal-undervalued)">OK  — Benchmarks loaded from cache</div>
      <div style="padding:6px 10px;background:var(--fs-signal-trap-bg);border-left:2px solid var(--fs-status-warn);font-family:var(--fs-font-mono);font-size:11px;color:var(--fs-signal-trap)">WARN — yfinance rate-limited, retrying</div>
      <div style="padding:6px 10px;background:var(--fs-signal-overvalued-bg);border-left:2px solid var(--fs-status-err);font-family:var(--fs-font-mono);font-size:11px;color:var(--fs-signal-overvalued)">ERR  — No data retrieved for NVDAX</div>
      <div style="padding:6px 10px;background:var(--fs-signal-premium-bg);border-left:2px solid var(--fs-status-info);font-family:var(--fs-font-mono);font-size:11px;color:var(--fs-signal-premium)">INFO — Industry mapping fallback applied</div>
    </div>
  </div>
</div></body></html>
