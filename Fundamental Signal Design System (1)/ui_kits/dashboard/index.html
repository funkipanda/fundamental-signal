<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Fundamental Signal · Screener</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root" data-screen-label="01 Screener"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

function App() {
  const [filter, setFilter] = useState("ALL");
  const [compact, setCompact] = useState(false);
  const [selected, setSelected] = useState("JPM");
  const [modalOpen, setModalOpen] = useState(false);
  const [rows, setRows] = useState(window.FS_TICKERS);

  useEffect(() => {
    document.body.classList.toggle("compact", compact);
  }, [compact]);

  const filtered = useMemo(() => {
    const order = { UNDERVALUED:0, VALUE_TRAP:1, OVERVALUED:2, QUALITY_PREMIUM:3, FAIR_VALUE:4 };
    let r = filter === "ALL" ? rows : rows.filter(r => r.classification === filter);
    return [...r].sort((a,b) => order[a.classification] - order[b.classification]);
  }, [rows, filter]);

  const selectedRow = filtered.find(r => r.ticker === selected) || rows.find(r => r.ticker === selected);

  return (
    <div className="app">
      <TopBar/>
      <Rail/>
      <div className="main">
        <div className="main-head">
          <div>
            <h1 className="fs-h1">Discrepancy screen</h1>
            <div className="sub">2026-04-23 · 9 tickers · benchmarks from Damodaran NYU (cached 14d)</div>
          </div>
        </div>
        <Counts rows={rows}/>
        <Toolbar filter={filter} setFilter={setFilter} compact={compact} setCompact={setCompact} onOpenWatchlist={()=>setModalOpen(true)}/>
        <div className="split">
          <SummaryTable rows={filtered} selected={selected} onSelect={setSelected}/>
          <DetailCard row={selectedRow}/>
        </div>
      </div>
      <WatchlistModal open={modalOpen} onClose={()=>setModalOpen(false)} onAdd={()=>{}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
