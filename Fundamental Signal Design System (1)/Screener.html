<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Fundamental Signal — Screener</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  :root {
    /* Spec-specific overrides: the user called out exact hex values and
       blue (not cyan) for QUALITY_PREMIUM. Keep these local; leave the
       design system tokens alone. */
    --page-bg:       #0f0f0f;
    --card-bg:       #1a1a1a;
    --card-bg-hover: #1f1f1f;
    --border:        #2a2a2a;
    --border-soft:   #222;

    --text:          #d6d6d6;
    --text-strong:   #f4f4f4;
    --text-muted:    #888;
    --text-dim:      #555;

    --sig-undervalued: #3ddc97;
    --sig-undervalued-bg: rgba(61, 220, 151, 0.12);
    --sig-overvalued:  #ff5a6b;
    --sig-overvalued-bg: rgba(255, 90, 107, 0.12);
    --sig-trap:        #f5c84b;
    --sig-trap-bg:     rgba(245, 200, 75, 0.12);
    --sig-premium:     #5a8bff;           /* blue per spec, not cyan */
    --sig-premium-bg:  rgba(90, 139, 255, 0.14);
    --sig-fair:        #8a8a8a;
    --sig-fair-bg:     rgba(138, 138, 138, 0.12);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--page-bg);
    color: var(--text);
    font-family: var(--fs-font-sans);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Top bar ---- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--page-bg);
  }
  .logo {
    font-family: var(--fs-font-mono);
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--text-strong);
  }
  .logo .accent { color: var(--sig-premium); }
  .date {
    font-family: var(--fs-font-mono);
    font-size: 11px; letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  /* ---- Main scroll area ---- */
  .page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 28px 48px;
  }

  /* ---- Section head ---- */
  .section-head {
    font-family: var(--fs-font-mono);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-soft);
  }

  /* ---- Ticker input bar ---- */
  .input-bar {
    margin-bottom: 28px;
  }
  .input-row {
    display: flex; gap: 0;
    border: 1px solid var(--border);
    background: var(--card-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .input-row input {
    flex: 1;
    background: transparent;
    border: 0; outline: 0;
    padding: 12px 14px;
    font-family: var(--fs-font-mono);
    font-size: 13px; letter-spacing: 0.02em;
    color: var(--text-strong);
  }
  .input-row input::placeholder { color: var(--text-dim); }
  .input-row input:focus { background: rgba(90, 139, 255, 0.04); }
  .input-row button {
    padding: 0 22px;
    background: var(--sig-premium);
    color: #0a0a0a;
    font-family: var(--fs-font-sans);
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    border: 0; cursor: pointer;
    border-left: 1px solid var(--border);
    transition: filter 0.1s;
  }
  .input-row button:hover { filter: brightness(1.08); }
  .input-row button:active { filter: brightness(0.92); }
  .bench-note {
    margin-top: 8px;
    font-family: var(--fs-font-mono);
    font-size: 11px;
    color: var(--text-muted);
  }
  .bench-note .dot {
    display: inline-block; width: 5px; height: 5px;
    background: var(--sig-premium); border-radius: 50%;
    margin-right: 6px; vertical-align: 2px;
  }

  /* ---- Summary table ---- */
  .table-wrap {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  table.screen {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--fs-font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 12.5px;
  }
  table.screen thead th {
    text-align: left;
    padding: 10px 14px;
    font-family: var(--fs-font-mono);
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted);
    background: #141414;
    border-bottom: 1px solid var(--border);
  }
  table.screen thead th.num { text-align: right; }
  table.screen tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: middle;
  }
  table.screen tbody tr:last-child td { border-bottom: 0; }
  table.screen tbody tr:hover { background: var(--card-bg-hover); }
  table.screen tbody td.num { text-align: right; }

  .tk {
    font-weight: 700;
    color: var(--text-strong);
    letter-spacing: 0.03em;
  }
  .nm {
    font-family: var(--fs-font-sans);
    color: var(--text-muted);
    font-size: 12px;
  }
  .sector-sub { color: var(--text-dim); font-size: 11px; }
  .na { color: var(--text-dim); }
  .cheap   { color: var(--sig-undervalued); }
  .expensive { color: var(--sig-overvalued); }

  /* ---- Signal badge (used in table + detail cards) ---- */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 9px;
    border-radius: 2px;
    font-family: var(--fs-font-mono);
    font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    white-space: nowrap;
  }
  .badge.u { background: var(--sig-undervalued-bg); color: var(--sig-undervalued); box-shadow: inset 0 0 0 1px rgba(61, 220, 151, 0.35); }
  .badge.o { background: var(--sig-overvalued-bg);  color: var(--sig-overvalued);  box-shadow: inset 0 0 0 1px rgba(255, 90, 107, 0.35); }
  .badge.t { background: var(--sig-trap-bg);        color: var(--sig-trap);        box-shadow: inset 0 0 0 1px rgba(245, 200, 75, 0.35); }
  .badge.p { background: var(--sig-premium-bg);     color: var(--sig-premium);     box-shadow: inset 0 0 0 1px rgba(90, 139, 255, 0.35); }
  .badge.f { background: var(--sig-fair-bg);        color: var(--sig-fair);        box-shadow: inset 0 0 0 1px rgba(138, 138, 138, 0.35); }

  /* ---- Confidence pill ---- */
  .conf {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--fs-font-mono);
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .conf .bar {
    display: inline-flex; gap: 2px;
  }
  .conf .bar i {
    width: 3px; height: 10px; display: inline-block;
    background: #2e2e2e;
  }
  .conf.high .bar i:nth-child(-n+3) { background: var(--sig-undervalued); }
  .conf.med  .bar i:nth-child(-n+2) { background: var(--sig-trap); }
  .conf.low  .bar i:nth-child(-n+1) { background: var(--text-dim); }

  /* ---- Detail cards ---- */
  .detail-cards { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .card-head:hover { background: #1c1c1c; }
  .card-head .chev {
    width: 14px; height: 14px;
    color: var(--text-muted);
    transition: transform 0.15s ease;
    flex: 0 0 auto;
  }
  .card.open .card-head .chev { transform: rotate(90deg); }
  .card-head .tk { font-size: 16px; }
  .card-head .nm { flex: 1; }
  .card-head .price {
    font-family: var(--fs-font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 14px; font-weight: 500;
    color: var(--text-strong);
  }
  .card-head .chg {
    font-family: var(--fs-font-mono); font-size: 11px;
    margin-left: 8px;
  }
  .card-head .chg.up { color: var(--sig-undervalued); }
  .card-head .chg.down { color: var(--sig-overvalued); }

  .card-body {
    display: none;
    padding: 4px 18px 18px;
    border-top: 1px solid var(--border-soft);
  }
  .card.open .card-body { display: block; }

  .col-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1.2fr;
    gap: 24px;
    padding: 16px 0 14px;
  }
  .col .col-head {
    font-family: var(--fs-font-mono);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-soft);
  }

  /* Valuation column */
  .val-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    column-gap: 10px;
    align-items: baseline;
    padding: 5px 0;
    font-family: var(--fs-font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .val-row + .val-row { border-top: 1px dashed var(--border-soft); }
  .val-row .k { color: var(--text); font-size: 11.5px; }
  .val-row .v { color: var(--text-strong); font-weight: 500; min-width: 52px; text-align: right; }
  .val-row .sv { color: var(--text-dim); font-size: 11px; min-width: 48px; text-align: right; }
  .val-row .ar { font-size: 11px; font-weight: 700; width: 14px; text-align: center; }
  .ar.down { color: var(--sig-undervalued); }
  .ar.up { color: var(--sig-overvalued); }
  .ar.flat { color: var(--text-dim); }

  /* Quality column */
  .q-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    column-gap: 10px;
    align-items: baseline;
    padding: 5px 0;
    font-family: var(--fs-font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .q-row + .q-row { border-top: 1px dashed var(--border-soft); }
  .q-row .k { color: var(--text); font-size: 11.5px; }
  .q-row .v { color: var(--text-strong); font-weight: 500; min-width: 54px; text-align: right; }
  .q-row .ico { width: 14px; text-align: center; font-weight: 700; }
  .ico.pass { color: var(--sig-undervalued); }
  .ico.fail { color: var(--sig-overvalued); }
  .ico.na { color: var(--text-dim); }

  /* Price context column */
  .range {
    margin-top: 14px;
    position: relative;
    height: 6px;
    background: #2e2e2e;
    border-radius: 1px;
  }
  .range .ma {
    position: absolute; top: -3px;
    width: 2px; height: 12px;
    background: var(--text-dim);
  }
  .range .ma.ma50 { background: var(--text-muted); }
  .range .cur {
    position: absolute; top: -4px;
    width: 2px; height: 14px;
    background: var(--sig-premium);
    transform: translateX(-1px);
  }
  .range .cur::before {
    content: "";
    position: absolute; left: 50%; top: -3px;
    width: 8px; height: 8px;
    background: var(--sig-premium);
    transform: translate(-50%, 0) rotate(45deg);
  }
  .range .cur-label {
    position: absolute;
    bottom: 16px;
    transform: translateX(-50%);
    padding: 1px 5px;
    background: var(--card-bg);
    border: 1px solid var(--sig-premium);
    border-radius: 2px;
    font-family: var(--fs-font-mono);
    font-size: 10px;
    color: var(--sig-premium);
    white-space: nowrap;
    z-index: 2;
  }
  .range .cur-label.clamp-right { transform: translateX(-100%); }
  .range .cur-label.clamp-left  { transform: translateX(0); }
  .range-meta {
    display: flex; justify-content: space-between;
    margin-top: 10px;
    font-family: var(--fs-font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
  }
  .range-legend {
    margin-top: 14px;
    display: flex; gap: 16px;
    font-family: var(--fs-font-mono);
    font-size: 10.5px;
    color: var(--text-muted);
  }
  .range-legend .sw { display: inline-block; width: 10px; height: 2px; margin-right: 6px; vertical-align: middle; }
  .range-legend .sw.ma50 { background: var(--text-muted); }
  .range-legend .sw.ma200 { background: var(--text-dim); }
  .range-legend .sw.cur { background: var(--sig-premium); }

  /* Flags */
  .flags {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
  }
  .flags-head {
    font-family: var(--fs-font-mono);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .flag-item {
    display: flex; align-items: baseline; gap: 10px;
    padding: 5px 0;
    font-family: var(--fs-font-sans);
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--text);
  }
  .flag-item .bullet {
    flex: 0 0 4px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    transform: translateY(6px);
  }
  .flag-item.u .bullet { background: var(--sig-undervalued); }
  .flag-item.o .bullet { background: var(--sig-overvalued); }
  .flag-item.t .bullet { background: var(--sig-trap); }
  .flag-item.p .bullet { background: var(--sig-premium); }
  .flag-item .caps {
    font-family: var(--fs-font-mono);
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    margin-right: 2px;
  }
  .flag-item.u .caps { color: var(--sig-undervalued); }
  .flag-item.o .caps { color: var(--sig-overvalued); }
  .flag-item.t .caps { color: var(--sig-trap); }
  .flag-item.p .caps { color: var(--sig-premium); }

  .sector-note {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(90, 139, 255, 0.06);
    border-left: 2px solid var(--sig-premium);
    font-family: var(--fs-font-sans);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .sector-note .lbl {
    font-family: var(--fs-font-mono);
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sig-premium);
    margin-right: 6px;
  }
</style>
</head>
<body>

<!-- =============== Top bar =============== -->
<div class="topbar">
  <div class="logo">FUNDAMENTAL <span class="accent">SIGNAL</span></div>
  <div class="date" id="topDate"></div>
</div>

<div class="page">

  <!-- =============== Ticker input bar =============== -->
  <section class="input-bar" data-screen-label="01 Screener Input">
    <div class="input-row">
      <input id="tickerInput" value="AAPL, MSFT, JPM, INTC, XOM" placeholder="Enter tickers, comma-separated (e.g. AAPL, MSFT, JPM)"/>
      <button id="screenBtn">Screen</button>
    </div>
    <div class="bench-note"><span class="dot"></span>Benchmarks: Damodaran NYU Stern (Jan 2026)</div>
  </section>

  <!-- =============== Summary table =============== -->
  <section>
    <div class="section-head">Screen results · 5 tickers</div>
    <div class="table-wrap">
      <table class="screen">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Name</th>
            <th>Signal</th>
            <th>Confidence</th>
            <th class="num">Fwd P/E <span style="color:var(--text-dim);font-weight:400">(sector)</span></th>
            <th class="num">EV/EBITDA <span style="color:var(--text-dim);font-weight:400">(sector)</span></th>
            <th class="num">FCF Yield</th>
            <th class="num">ROE</th>
            <th class="num">D/E</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- =============== Detail cards =============== -->
  <section class="detail-cards" id="detailCards"></section>

</div>

<script>
/* ---------- Data (hardcoded per spec) ---------- */
const TICKERS = [
  {
    ticker: "INTC", name: "Intel Corporation",
    sector: "Technology", industry: "Semiconductors",
    classification: "OVERVALUED", confidence: "medium",
    price: 67.26, change: 0.15, changePct: 0.22,
    metrics: {
      forward_pe: 60.2,   forward_pe_sector: 37,
      ev_ebitda: 27.5,    ev_ebitda_sector: 26,
      fcf_yield: -0.013,
      roe: 0.000,
      cf_quality: -36.3,
      debt_equity: 0.4,
    },
    range52: { low: 18.50, high: 72.10, ma50: 62.40, ma200: 48.90 },
    flags: [
      { kind: "t", text: "Looks cheap on some metrics — but quality concerns override:" },
      { kind: "o", caps: "WARNING:", text: "ROE is 0.0% (below 10% threshold)" },
      { kind: "o", caps: "WARNING:", text: "CF Quality is -36.3x — earnings not backed by cash" },
      { kind: "o", caps: "NEAR 52-WEEK HIGH:", text: "trading in top 10% of range — mean-reversion risk" },
    ],
    sectorNote: null,
  },
  {
    ticker: "AAPL", name: "Apple Inc.",
    sector: "Technology", industry: "Consumer Electronics",
    classification: "QUALITY_PREMIUM", confidence: "high",
    price: 272.11, change: -1.84, changePct: -0.67,
    metrics: {
      forward_pe: 29.0,   forward_pe_sector: 20,
      ev_ebitda: 26.4,    ev_ebitda_sector: 4,
      fcf_yield: 0.027,
      roe: 1.520,
      cf_quality: 1.2,
      debt_equity: 1.0,
    },
    range52: { low: 221.10, high: 298.40, ma50: 268.10, ma200: 251.50 },
    flags: [
      { kind: "p", text: "Trading at a premium to sector on 3/3 valuation metrics" },
      { kind: "p", text: "Quality is exceptional: ROE 152% — market pricing in durable franchise" },
      { kind: "p", text: "EV/EBITDA gap (26.4x vs 4x) reflects a capital-light buyback machine" },
    ],
    sectorNote: "Tech companies often trade at high P/E; focus on PEG and EV/Revenue for growth names.",
  },
  {
    ticker: "XOM", name: "Exxon Mobil Corporation",
    sector: "Energy", industry: "Oil & Gas Integrated",
    classification: "QUALITY_PREMIUM", confidence: "medium",
    price: 149.94, change: 1.02, changePct: 0.68,
    metrics: {
      forward_pe: 14.9,   forward_pe_sector: 22,
      ev_ebitda: 11.3,    ev_ebitda_sector: 8,
      fcf_yield: 0.020,
      roe: 0.111,
      cf_quality: 1.8,
      debt_equity: 0.2,
    },
    range52: { low: 102.10, high: 158.90, ma50: 145.20, ma200: 128.70 },
    flags: [
      { kind: "u", text: "Cheap on P/E vs sector (14.9x vs 22x) — 32% discount" },
      { kind: "p", text: "Quality is strong: ROE 11.1%, CF Quality 1.8x, low leverage 0.2x D/E" },
      { kind: "t", caps: "CYCLICAL SECTOR:", text: "P/E unreliable at earnings peaks/troughs; EV/EBITDA weighted more heavily" },
    ],
    sectorNote: "Cyclical sector: P/E unreliable at earnings peaks/troughs. EV/EBITDA weighted more heavily.",
  },
  {
    ticker: "MSFT", name: "Microsoft Corporation",
    sector: "Technology", industry: "Software—Infrastructure",
    classification: "FAIR_VALUE", confidence: "low",
    price: 484.22, change: 3.41, changePct: 0.71,
    metrics: {
      forward_pe: 22.0,   forward_pe_sector: 34,
      ev_ebitda: 18.5,    ev_ebitda_sector: 18,
      fcf_yield: 0.017,
      roe: 0.344,
      cf_quality: null,
      debt_equity: 0.3,
    },
    range52: { low: 385.60, high: 512.40, ma50: 478.20, ma200: 445.10 },
    flags: [],
    sectorNote: null,
  },
  {
    ticker: "JPM", name: "JP Morgan Chase & Co",
    sector: "Financial Services", industry: "Banks—Diversified",
    classification: "FAIR_VALUE", confidence: "low",
    price: 198.45, change: 2.31, changePct: 1.18,
    metrics: {
      forward_pe: 13.2,   forward_pe_sector: 13,
      ev_ebitda: null,    ev_ebitda_sector: null, suppressed_ev: true,
      fcf_yield: null,    suppressed_fcf: true,
      roe: 0.165,
      cf_quality: null,
      debt_equity: null,  suppressed_de: true,
    },
    range52: { low: 167.20, high: 215.80, ma50: 192.30, ma200: 188.50 },
    flags: [],
    sectorNote: "Banks operate at 8–20x leverage by design; D/E, EV/EBITDA and FCF Yield suppressed for financials.",
  },
];

/* ---------- Config ---------- */
const SIG_ORDER = { UNDERVALUED: 0, VALUE_TRAP: 1, OVERVALUED: 2, QUALITY_PREMIUM: 3, FAIR_VALUE: 4 };
const SIG_CLS   = { UNDERVALUED: "u", VALUE_TRAP: "t", OVERVALUED: "o", QUALITY_PREMIUM: "p", FAIR_VALUE: "f" };

/* ---------- Formatters ---------- */
const fmtX    = (v, d=1) => v == null ? `<span class="na">N/A</span>` : `${v.toFixed(d)}x`;
const fmtPct  = (v, d=1) => v == null ? `<span class="na">N/A</span>` : `${(v*100).toFixed(d)}%`;
const fmtUSD  = (v) => v == null ? "—" : `$${v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;

/* ---------- Top date ---------- */
document.getElementById("topDate").textContent = new Date().toLocaleDateString("en-US", {
  year: "numeric", month: "short", day: "2-digit"
}).toUpperCase() + " · 14:32 ET";

/* ---------- Sort (most actionable first) ---------- */
const rows = [...TICKERS].sort((a, b) => SIG_ORDER[a.classification] - SIG_ORDER[b.classification]);

/* ---------- Cell renderers ---------- */
function cellVsSector(v, sector, dir = "lower") {
  if (v == null) return `<span class="na">N/A</span>`;
  if (sector == null) return `${v.toFixed(1)}x`;
  const fav = dir === "lower" ? (sector - v) / sector : (v - sector) / sector;
  let cls = "";
  if (fav > 0.10) cls = "cheap";
  else if (fav < -0.10) cls = "expensive";
  return `<span class="${cls}">${v.toFixed(1)}x</span> <span style="color:var(--text-dim)">(${sector})</span>`;
}

function confPill(conf) {
  const lvl = conf === "high" ? "high" : conf === "medium" ? "med" : "low";
  return `<span class="conf ${lvl}">
    <span class="bar"><i></i><i></i><i></i></span>${conf}
  </span>`;
}

/* ---------- Table ---------- */
const tbody = document.getElementById("tbody");
tbody.innerHTML = rows.map(r => `
  <tr>
    <td class="tk">${r.ticker}</td>
    <td><div class="nm">${r.name}</div><div class="sector-sub">${r.sector}</div></td>
    <td><span class="badge ${SIG_CLS[r.classification]}">${r.classification.replace("_"," ")}</span></td>
    <td>${confPill(r.confidence)}</td>
    <td class="num">${cellVsSector(r.metrics.forward_pe, r.metrics.forward_pe_sector)}</td>
    <td class="num">${r.metrics.suppressed_ev ? `<span class="na">N/A</span>` : cellVsSector(r.metrics.ev_ebitda, r.metrics.ev_ebitda_sector)}</td>
    <td class="num">${r.metrics.suppressed_fcf ? `<span class="na">N/A</span>` : (r.metrics.fcf_yield == null ? `<span class="na">N/A</span>` : `<span class="${r.metrics.fcf_yield < 0 ? 'expensive' : ''}">${(r.metrics.fcf_yield*100).toFixed(1)}%</span>`)}</td>
    <td class="num">${fmtPct(r.metrics.roe)}</td>
    <td class="num">${r.metrics.suppressed_de ? `<span class="na">N/A</span>` : fmtX(r.metrics.debt_equity)}</td>
  </tr>
`).join("");

/* ---------- Detail cards (non-FAIR_VALUE only per spec) ---------- */
function valRow(label, stock, sector, dir = "lower", fmt = "x") {
  const format = (v) => v == null ? null : (fmt === "%" ? `${(v*100).toFixed(1)}%` : `${v.toFixed(1)}x`);
  if (stock == null) {
    return `<div class="val-row"><span class="k">${label}</span><span class="v na">N/A</span><span class="sv"></span><span class="ar flat">―</span></div>`;
  }
  let arrow = "flat", ar = "―";
  if (sector != null) {
    const fav = dir === "lower" ? (sector - stock) / sector : (stock - sector) / sector;
    if (fav > 0.10) { arrow = "down"; ar = "▼"; }
    else if (fav < -0.10) { arrow = "up"; ar = "▲"; }
  }
  return `<div class="val-row">
    <span class="k">${label}</span>
    <span class="v">${format(stock)}</span>
    <span class="sv">${sector != null ? `vs ${sector.toFixed(0)}` : "—"}</span>
    <span class="ar ${arrow}">${ar}</span>
  </div>`;
}

function qRow(label, value, pass, fmt = "x") {
  let v;
  if (value == null) v = `<span class="na">N/A</span>`;
  else if (fmt === "%") v = `${(value*100).toFixed(1)}%`;
  else v = `${value.toFixed(1)}x`;
  const ico = pass === "pass" ? `<span class="ico pass">✓</span>`
            : pass === "fail" ? `<span class="ico fail">✗</span>`
            : `<span class="ico na">―</span>`;
  return `<div class="q-row"><span class="k">${label}</span><span class="v">${v}</span>${ico}</div>`;
}

function renderRange(r) {
  const pos = Math.max(0, Math.min(100, ((r.price - r.range52.low) / (r.range52.high - r.range52.low)) * 100));
  const ma50 = ((r.range52.ma50 - r.range52.low) / (r.range52.high - r.range52.low)) * 100;
  const ma200 = ((r.range52.ma200 - r.range52.low) / (r.range52.high - r.range52.low)) * 100;
  return `
    <div class="range">
      <div class="ma ma200" style="left:${ma200}%"></div>
      <div class="ma ma50"  style="left:${ma50}%"></div>
      <div class="cur" style="left:${pos}%"><div class="cur-label ${pos > 88 ? 'clamp-right' : pos < 12 ? 'clamp-left' : ''}">${fmtUSD(r.price)}</div></div>
    </div>
    <div class="range-meta">
      <span>${fmtUSD(r.range52.low)}</span>
      <span>${pos.toFixed(0)}% of range</span>
      <span>${fmtUSD(r.range52.high)}</span>
    </div>
    <div class="range-legend">
      <span><span class="sw cur"></span>Current</span>
      <span><span class="sw ma50"></span>50d MA · ${fmtUSD(r.range52.ma50)}</span>
      <span><span class="sw ma200"></span>200d MA · ${fmtUSD(r.range52.ma200)}</span>
    </div>
  `;
}

function renderCard(r, idx) {
  const m = r.metrics;
  const sig = SIG_CLS[r.classification];
  const chg = r.change >= 0 ? "up" : "down";
  const roePass = m.roe >= 0.10 ? "pass" : m.roe === 0 ? "fail" : "fail";
  const cfPass  = m.cf_quality == null ? "na" : (m.cf_quality >= 0.8 ? "pass" : "fail");
  const dePass  = m.suppressed_de ? "na" : (m.debt_equity <= 2.0 ? "pass" : "fail");

  return `
    <div class="card${idx === 0 ? " open" : ""}" data-idx="${idx}">
      <div class="card-head">
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="tk">${r.ticker}</span>
        <span class="badge ${sig}">${r.classification.replace("_"," ")}</span>
        <span class="nm">${r.name}</span>
        <span>
          <span class="price">${fmtUSD(r.price)}</span>
          <span class="chg ${chg}">${r.change >= 0 ? "+" : ""}${r.change.toFixed(2)} (${r.change >= 0 ? "+" : ""}${r.changePct.toFixed(2)}%)</span>
        </span>
      </div>
      <div class="card-body">
        <div class="col-row">
          <div class="col">
            <div class="col-head">Valuation vs sector</div>
            ${valRow("Forward P/E", m.forward_pe, m.forward_pe_sector, "lower", "x")}
            ${m.suppressed_ev
              ? `<div class="val-row"><span class="k">EV/EBITDA</span><span class="v na">N/A</span><span class="sv" style="color:var(--text-dim);font-size:10.5px">suppressed</span><span class="ar flat">―</span></div>`
              : valRow("EV/EBITDA", m.ev_ebitda, m.ev_ebitda_sector, "lower", "x")}
            ${m.suppressed_fcf
              ? `<div class="val-row"><span class="k">FCF Yield</span><span class="v na">N/A</span><span class="sv" style="color:var(--text-dim);font-size:10.5px">suppressed</span><span class="ar flat">―</span></div>`
              : `<div class="val-row"><span class="k">FCF Yield</span><span class="v ${m.fcf_yield != null && m.fcf_yield < 0 ? 'expensive' : ''}">${m.fcf_yield == null ? '<span class="na">N/A</span>' : (m.fcf_yield*100).toFixed(1) + '%'}</span><span class="sv">vs 5.0%</span><span class="ar ${m.fcf_yield != null && m.fcf_yield >= 0.05 ? 'down' : m.fcf_yield != null && m.fcf_yield < 0 ? 'up' : 'flat'}">${m.fcf_yield != null && m.fcf_yield >= 0.05 ? '▼' : m.fcf_yield != null && m.fcf_yield < 0 ? '▲' : '―'}</span></div>`}
          </div>
          <div class="col">
            <div class="col-head">Quality</div>
            ${qRow("ROE", m.roe, roePass, "%")}
            ${qRow("CF Quality", m.cf_quality, cfPass, "x")}
            ${qRow("D/E", m.suppressed_de ? null : m.debt_equity, dePass, "x")}
          </div>
          <div class="col">
            <div class="col-head">Price context · 52-week</div>
            ${renderRange(r)}
          </div>
        </div>

        ${r.flags.length ? `
          <div class="flags">
            <div class="flags-head">Flags</div>
            ${r.flags.map(f => `
              <div class="flag-item ${f.kind}">
                <span class="bullet"></span>
                <span>${f.caps ? `<span class="caps">${f.caps}</span>` : ""}${f.text}</span>
              </div>
            `).join("")}
          </div>
        ` : ""}

        ${r.sectorNote ? `
          <div class="sector-note">
            <span class="lbl">Sector note</span>${r.sectorNote}
          </div>
        ` : ""}
      </div>
    </div>
  `;
}

const detailRows = rows.filter(r => r.classification !== "FAIR_VALUE");
document.getElementById("detailCards").innerHTML = detailRows.map(renderCard).join("");

/* ---------- Expand/collapse ---------- */
document.querySelectorAll(".card-head").forEach(h => {
  h.addEventListener("click", () => h.closest(".card").classList.toggle("open"));
});

/* ---------- Screen button (visual-only rerun) ---------- */
document.getElementById("screenBtn").addEventListener("click", () => {
  const btn = document.getElementById("screenBtn");
  const orig = btn.textContent;
  btn.textContent = "Running…";
  btn.style.filter = "brightness(0.7)";
  setTimeout(() => {
    btn.textContent = orig;
    btn.style.filter = "";
  }, 700);
});
</script>
</body>
</html>
